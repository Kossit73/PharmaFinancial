version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      FINANCIAL_MODELS_USER_DB_URL: postgresql://financial_models:financial_models@db:5432/financial_models
      SUBSCRIPTION_STORE_URL: postgresql://financial_models:financial_models@db:5432/financial_models
      SUBSCRIPTION_CACHE_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: financial_models
      POSTGRES_PASSWORD: financial_models
      POSTGRES_DB: financial_models
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  db_data:
